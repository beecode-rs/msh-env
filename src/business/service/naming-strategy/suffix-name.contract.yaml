subject: NamingStrategySuffixName
module: ./suffix-name.js
subjectType: class
constructor:
  terms:
    - params: ['_test']
      result:
        _suffix: '_test'
methods:
  names:
    terms:
      # One — single name suffixed with "_"
      - constructorParams: ['_test']
        params:
          - ['some-name']
        result: ['some-name_test']
      # One — single name suffixed with "-"
      - constructorParams: ['-test']
        params:
          - ['some-name']
        result: ['some-name-test']
      # Many — multiple names suffixed with "_"
      - constructorParams: ['_test']
        params:
          - ['name-one', 'name-two']
        result: ['name-one_test', 'name-two_test']
      # Many — multiple names suffixed with "-"
      - constructorParams: ['-test']
        params:
          - ['name-one', 'name-two']
        result: ['name-one-test', 'name-two-test']
